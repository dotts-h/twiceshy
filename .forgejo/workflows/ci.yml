name: CI

# Triggers run CI exactly once per change: `pull_request` validates a branch while
# a PR is open, and `push` validates main on merge. A feature branch
# is NEVER listed under `push` — that runs the whole pipeline twice per push (the
# push event AND the pull_request event, on refs the concurrency group can't dedup).
# scripts/check-workflows.sh guards this invariant.
#
# No `paths-ignore`: this job is a REQUIRED status check in branch protection, and
# a path-filtered workflow that doesn't run posts no status — leaving the required
# context pending and hanging a docs-only PR unmergeable. Running the full (fast)
# pipeline on every change is the price of a reliable required gate.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    # No comma in this name: the status context (`CI / Lint guard & test
    # (pull_request)`) is copied verbatim into branch-protection.json's
    # comma-separated required_checks, so a comma here would split the name.
    name: Lint guard & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          # This Forgejo runner has no GH-Actions cache service; setup-go's
          # default cache=true hangs ~5min then fails (connect ETIMEDOUT). The
          # Go module/build cache persists on the runner volume regardless.
          cache: false
      - name: install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" v2.5.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: Workflow invariants (no CI double-runs; release version resolution)
        run: bash scripts/check-workflows.sh
      # `make ci` = golangci-lint + `go test -race` + cover-check (the awk float
      # comparison enforces the 80% floor and FAILS below it). This is the same
      # gate `make ci` runs locally, so green-here == green-there.
      - name: Lint, race tests & coverage floor
        run: make ci
