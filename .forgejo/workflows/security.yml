name: security

# Security gate. Same single-run trigger rule as the quality recipe:
# `pull_request` validates a branch while a PR is open, `push` validates
# main on merge — a feature branch is NEVER under `push` (that
# double-runs). scripts/check-workflows.sh (quality recipe) guards this.
#
# No `paths-ignore`: these jobs are REQUIRED status checks in branch protection,
# and a path-filtered workflow that doesn't run posts no status — leaving the
# required context pending and hanging a docs-only PR unmergeable. The scans are
# cheap, so run them on every change.
#
# Host-neutral: the same file runs on GitHub Actions and on a Forgejo/Gitea
# Actions runner. gitleaks is installed as a binary (its action isn't mirrored
# on this runner's source); setup-go + govulncheck resolve normally.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sast:
    name: SAST & dependency audit (twiceshy)
    runs-on: twiceshy-ci  # dedicated hardened runner: gVisor + no host docker socket (ADR-0012)
    steps:
      - uses: actions/checkout@v4
      # Interim D (ADR-0021 #0078): a data-only PR skips the heavy Go audit while
      # this job still posts its required status context. Fail-closed (see ci.yml).
      - name: Detect data-only change
        id: detect
        run: |
          skip="$(EVENT_NAME='${{ github.event_name }}' \
                  BASE_SHA='${{ github.event.pull_request.base.sha }}' \
                  bash scripts/ci-data-only.sh)"
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "data-only skip=$skip"
      - uses: actions/setup-go@v5
        if: steps.detect.outputs.skip != 'true'
        with:
          go-version-file: go.mod
          # No GH-Actions cache service on this Forgejo runner; cache=true hangs
          # ~5min then fails (connect ETIMEDOUT). See .forgejo/workflows/ci.yml.
          cache: false
      - name: Verify module checksums (supply chain)
        if: steps.detect.outputs.skip != 'true'
        run: go mod verify
      - name: install govulncheck
        if: steps.detect.outputs.skip != 'true'
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@v1.4.0
          echo "$(go env GOPATH)/bin" >> "$GITHUB_PATH"
      - name: SAST (go vet)
        if: steps.detect.outputs.skip != 'true'
        run: go vet ./...
      - name: Dependency / vulnerability audit (govulncheck)
        if: steps.detect.outputs.skip != 'true'
        run: govulncheck ./...

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: twiceshy-ci  # dedicated hardened runner: gVisor + no host docker socket (ADR-0012)
    # Rendered from the secret_scan answer at install time. With secret_scan=no
    # the recipe omits the .gitleaks.toml config and this guard keeps the job a
    # no-op; flip it to a literal `true` (or re-install with secret_scan=yes) to
    # enforce it.
    if: ${{ 'yes' == 'yes' }}
    steps:
      - uses: actions/checkout@v4
        with:
          # gitleaks diffs history on a push and the PR range on a PR; fetch the
          # full history so a secret added in an earlier commit is still caught.
          fetch-depth: 0
      # Interim D (ADR-0021 #0078): a data-only PR skips the scan while this job
      # still posts its required status context. Fail-closed (see ci.yml).
      - name: Detect data-only change
        id: detect
        run: |
          skip="$(EVENT_NAME='${{ github.event_name }}' \
                  BASE_SHA='${{ github.event.pull_request.base.sha }}' \
                  bash scripts/ci-data-only.sh)"
          echo "skip=$skip" >> "$GITHUB_OUTPUT"
          echo "data-only skip=$skip"
      # Install the gitleaks binary directly instead of gitleaks/gitleaks-action@v2:
      # this Forgejo runner resolves bare actions from data.forgejo.org, where that
      # action isn't mirrored ("repository not found"), and the action also wants a
      # license for some paths. The binary needs neither. Config + allowlist live in
      # .gitleaks.toml (exempts test fixtures).
      - name: install gitleaks
        if: steps.detect.outputs.skip != 'true'
        run: |
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks
      - name: gitleaks
        if: steps.detect.outputs.skip != 'true'
        run: gitleaks detect --source . --config .gitleaks.toml --redact --no-banner
