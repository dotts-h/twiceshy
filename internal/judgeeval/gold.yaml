# twiceshy judge gold set — ground truth for the judge-prompt eval (ADR-0013 #0028).
#
# 27 hand-labeled cases across every failure mode the judge must catch. Claude is
# the ground-truth labeller; each case carries the rationale for its label so a
# reviewer can audit the judgement, not just the verdict.
#
# IMPORTANT — what the judge actually sees. The production prompt (judge.BuildPrompt)
# renders ONLY: kind, status, title, symptom.summary, error_signatures, applies_to
# (ecosystem + package only — NOT versions/runtime), resolution.root_cause/fix,
# provenance.source_license, the attestation (holds/inconclusive/reproduced_under),
# and the repro bodies. It does NOT render the markdown narrative body, the version
# range, or the runtime map. Every defect below is therefore placed in a rendered
# field, so the gold set is fully judgeable under the real prompt. (The rendering
# gap — body/versions/runtime invisibility — is a separate finding, see the eval.)
#
# Scoring: the headline metric is decision-level. A REJECT case is a false-approve
# (fail-UNSAFE) if the judge approves it; an APPROVE case is a false-reject
# (over-conservative) if the judge rejects it. want_failing_checks is the check(s)
# we expect to carry the rejection — a secondary, per-check recall diagnostic.

cases:
  # ───────────────────────── APPROVE (8) — clean, every check passes ─────────────────────────
  - id: A1
    mode: approve
    want_decision: approve
    want_failing_checks: []
    rationale: >-
      Textbook clean deprecation record. Root cause + fix are accurate Go facts,
      applies_to is exactly the proven package, the repro greps the real SA1019
      signature fail-pre/pass-post, source is facts-only. Nothing to fault — the
      control that a healthy record sails through.
    record:
      id: exp-9001
      kind: fix
      status: quarantined
      title: io/ioutil is deprecated since Go 1.16 — use the io and os replacements
      symptom:
        summary: staticcheck flags io/ioutil functions as deprecated; the package was superseded in Go 1.16.
        error_signatures:
          - "SA1019: ioutil.ReadAll is deprecated: As of Go 1.16, this function simply calls io.ReadAll."
      applies_to:
        - ecosystem: Go
          package: io/ioutil
      resolution:
        root_cause: Go 1.16 moved io/ioutil's functions into io and os; the package now exists only for backward compatibility.
        fix: Replace ioutil.ReadAll/ReadFile with io.ReadAll and os.ReadFile; ioutil.TempFile/TempDir with os.CreateTemp/MkdirTemp.
      provenance:
        source_license: none (facts only)
        source_url: https://go.dev/doc/go1.16#ioutil
    attestation:
      holds: true
      inconclusive: false
      reproduced_under: ["go1.25"]
    repros:
      - path: experience/repro/exp-9001/repro.sh
        kind: positive
        label: staticcheck SA1019 on trap, clean on fix
        content: |
          #!/bin/sh
          set -u
          (cd /work/trap && staticcheck .) 2>&1 | grep -q SA1019 || { echo 'NOT REPRODUCED'; exit 1; }
          (cd /work/fix && staticcheck .) >/dev/null 2>&1 || { echo 'FIX BROKEN'; exit 1; }
          echo OK

