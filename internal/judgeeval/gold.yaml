        fix: Use cases.Title(language.Und) from golang.org/x/text/cases instead of strings.Title.
      provenance:
        source_license: none (facts only)
        source_url: https://pkg.go.dev/strings#Title
    attestation:
      holds: true
      inconclusive: false
