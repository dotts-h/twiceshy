# License-clean (distilled facts only, authored in twiceshy's own words — no
# third-party prose; ADR-0003 §4). Go stdlib deprecations whose staticcheck
# SA1019 diagnostic is a fingerprintable error signature. Sources: the Go
# release notes and the staticcheck SA1019 documentation (facts only).
- title: "io/ioutil is deprecated since Go 1.16 — use the io and os replacements"
  summary: "staticcheck flags io/ioutil functions as deprecated; the package was superseded in Go 1.16."
  diagnostic: "SA1019: ioutil.ReadAll is deprecated: As of Go 1.16, this function simply calls io.ReadAll."
  package: "io/ioutil"
  introduced: "1.16"
  root_cause: "Go 1.16 moved io/ioutil's functions into io and os; the package now exists only for backward compatibility."
  fix: "Replace ioutil.ReadAll/ReadFile/WriteFile/Discard with io.ReadAll, os.ReadFile, os.WriteFile, io.Discard; replace ioutil.TempFile/TempDir with os.CreateTemp/MkdirTemp."
  body: |
    Go 1.16 deprecated the entire io/ioutil package: each function gained a
    direct replacement in io or os. Code still compiles, but staticcheck SA1019
    flags every call. Migrate to the io/os equivalents — behavior is identical.
  source_url: "https://go.dev/doc/go1.16#ioutil"
- title: "strings.Title is deprecated since Go 1.18 — use golang.org/x/text/cases"
  summary: "staticcheck flags strings.Title as deprecated; its word-boundary rule mishandles Unicode."
  diagnostic: "SA1019: strings.Title is deprecated: The rule Title uses for word boundaries does not handle Unicode punctuation properly."
  package: "strings"
  introduced: "1.18"
  root_cause: "strings.Title uses a naive ASCII word-boundary rule that is wrong for Unicode punctuation and is not locale-aware."
  fix: "Use cases.Title from golang.org/x/text/cases with an explicit language tag for correct, locale-aware title casing."
  body: |
    Go 1.18 deprecated strings.Title because its word-boundary handling is
    incorrect for Unicode. staticcheck SA1019 flags it. Use
    golang.org/x/text/cases.Title with an explicit language.Tag instead.
  source_url: "https://pkg.go.dev/strings#Title"
- title: "rand.Seed is deprecated since Go 1.20 — the global source is auto-seeded"
  summary: "staticcheck flags math/rand Seed as deprecated; programs no longer need to seed the global source."
  diagnostic: "SA1019: rand.Seed is deprecated: As of Go 1.20 there is no reason to call Seed with a random value."
  package: "math/rand"
  introduced: "1.20"
  root_cause: "Go 1.20 auto-seeds the global math/rand source randomly, so a manual Seed call is unnecessary and can reduce randomness."
  fix: "Remove rand.Seed(time.Now().UnixNano()); when an explicitly seeded generator is required, use rand.New(rand.NewSource(seed))."
  body: |
    Go 1.20 made the top-level math/rand functions use a randomly-seeded global
    source, so calling rand.Seed is now deprecated (staticcheck SA1019) and only
    makes output less random. Drop the Seed call, or use a local rand.New source
    when determinism is required.
  source_url: "https://go.dev/doc/go1.20#math/rand"
